    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);

  body.dark {
    --bg-primary: #111512;
    --bg-secondary: #191E1A;
    --bg-card: #202722;
    --text-primary: #ECF2ED;
    --text-secondary: #9FB0A3;
    --text-tertiary: #6E7D72;
    --brand-primary: #418554;
    --brand-secondary: #253328;
    --brand-dark: #A4D4B1;
    --accent: #E5C158;
    --accent-bg: #38311B;
    --border: #2F3B32;
    --border-hover: #46594B;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.45);
    --danger: #FF6B6B;
    --danger-bg: #3D1C1C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-size: 15px;
    line-height: 1.5;
    transition: background-color 0.3s var(--transition), color 0.3s var(--transition);

    height: 100vh;

  input, select, textarea, button {
    font-family: inherit;
    font-size: 14px;
    outline: none;

  /* Custom Scrollbar styling */
  ::-webkit-scrollbar {
    width: 6px;
    height: 6px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 10px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--border-hover);
  }

  /* Drag and Pan Image cursor */
  .zoom-container {
    cursor: grab;
  }
  .zoom-container:active {
    cursor: grabbing;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Day / time helpers ────────────────────────────────────────────────────
const now = new Date();
const DAY = now.getDay();                         // 0=Sun, 1=Mon … 6=Sat
const IS_FRI_SUN = [0, 5, 6].includes(DAY);      // items only available Fri–Sun

function fmtDate(d) {
  return d.toLocaleDateString("en-AU", { weekday: "short", day: "2-digit", month: "short", year: "numeric" });
}
function fmtTime(d) {
  return d.toLocaleTimeString("en-AU", { hour: "2-digit", minute: "2-digit", hour12: true });
}
function addMins(mins) {
  const d = new Date(Date.now() + mins * 60000);
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function fmt12h(t24) {
  if (!t24) return "";
  const [h, m] = t24.split(":").map(Number);
  const ampm = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,"0")} ${ampm}`;
}

      { id: "aloe_vera",            name: "Aloe vera",              prices: { one: 0.8 }, desc: "Cooling sweet gel aloe vera chunks." },
      { id: "lychee_popping_pearls",name: "Lychee popping pearls",  prices: { one: 0.8 }, desc: "Fun popping bubbles filled with sweet lychee juice." },
      { id: "rainbow_jelly",        name: "Rainbow jelly",          prices: { one: 0.8 }, desc: "Firm, multi-colored fruit jelly pieces." },
      { id: "herbal_jelly",         name: "Herbal jelly",           prices: { one: 0.8 }, desc: "Traditional soothing grass jelly cubes." },
    ],
  },
};

const FRIES_OPTIONS = [
  { id: "plum_fries",        name: "Plum fries" },
  { id: "sweet_potato_fries",name: "Sweet potato fries" },
];
const REFRESHMENT_OPTIONS = [
  { id: "mint_lemonade",       name: "Mint lemonade" },
  { id: "mint_straw_lemonade", name: "Mint strawberry lemonade" },
  { id: "iced_lychee",         name: "Iced lychee" },
  { id: "iced_jasmine_tea",    name: "Iced jasmine tea" },
  { id: "iced_straw_jasmine",  name: "Iced strawberry jasmine tea" },
  { id: "viet_iced_coffee",    name: "Vietnamese iced coffee" },
];

function getPrice(item, size) {
  if (item.prices.one !== undefined) return item.prices.one;
  return item.prices[size] || 0;
}

// ─── App Component ────────────────────────────────────────────────────────
function App() {
  const [customerName,  setCustomerName]  = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [orderType,     setOrderType]     = useState("pickup");
  const [pickupTime,    setPickupTime]    = useState("");
  const [pickupAsap,    setPickupAsap]    = useState(false);
  const [orderItems,    setOrderItems]    = useState([]);
  const [notes,         setNotes]         = useState("");
  const [showSummary,   setShowSummary]   = useState(false);
  const [dark,          setDark]          = useState(true);
  const [searchQuery,   setSearchQuery]   = useState("");

  // Combo Deal details builder
  const [comboPickDrink,setComboPickDrink]= useState(REFRESHMENT_OPTIONS[0].id);
  const [comboPickFries,setComboPickFries]= useState("plum_fries");
  const [comboExpanded, setComboExpanded] = useState(false);

  // Live Clock
  const [clockStr, setClockStr] = useState(fmtTime(new Date()));
  useEffect(() => {
    const id = setInterval(() => setClockStr(fmtTime(new Date())), 10000);
    return () => clearInterval(id);
  }, []);

  // Right Panel reference: 'menu' or 'details'
  const [activeTab, setActiveTab] = useState("menu");
  const [detailsSearch, setDetailsSearch] = useState("");

  // Physical Menu Image Zoom state
  const [zoomScale, setZoomScale] = useState(1);
  const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
  const [isPanning, setIsPanning] = useState(false);
  const dragStart = useRef({ x: 0, y: 0 });
  const imageContainerRef = useRef(null);

  useEffect(() => {
    document.body.className = dark ? "dark" : "";
  }, [dark]);

  // Order Operations
  const addItem = (item, cat) => {
    const hasSize = !!cat.askSize;
    const defaultSize = item.noSmall ? "L" : hasSize ? "S" : null;
    setOrderItems(prev => [...prev, {
      id: Date.now() + Math.random(),
      itemId: item.id, name: item.name, category: cat.label,
      size: defaultSize,
      sauce:      cat.askSauce      ? "Tare"  : null,
      seasoning:  cat.askSeasoning  ? "Cumin" : null,
      spice:      cat.askSpice      ? "Cumin" : null,
      qty: 1, baseItem: item,
      hasSize, hasSauce: !!cat.askSauce,
      hasSeasoning: !!cat.askSeasoning, hasSpice: !!cat.askSpice,
    }]);
  };
  const removeItem = id => setOrderItems(prev => prev.filter(i => i.id !== id));
  const updateItem = (id, field, value) =>
    setOrderItems(prev => prev.map(i => i.id === id ? { ...i, [field]: value } : i));
  const total = orderItems.reduce((sum, i) => sum + getPrice(i.baseItem, i.size) * i.qty, 0);

  // Copy details helper
  const copyText = (txt) => {
    navigator.clipboard.writeText(txt);
  };

  // Build Monospace Order Text
  const buildSummary = () => {
    const ts   = `${fmtDate(new Date())} — ${fmtTime(new Date())}`;
    const ptxt = pickupAsap ? "ASAP" : pickupTime ? fmt12h(pickupTime) : "—";
    const lines = [
      `ORDER SUMMARY — ${ts}`,
      `Customer: ${customerName || "—"}  |  Phone: ${customerPhone || "—"}`,
      `Order type: ${orderType === "pickup" ? "Pick up" : "Dine in"}  |  Pickup time: ${ptxt}`,
      "─".repeat(44),
    ];
    orderItems.forEach(i => {
      const extras = [];
      if (i.size)      extras.push(i.size === "S" ? "Small" : "Large");
      if (i.sauce)     extras.push(`Sauce: ${i.sauce}`);
      if (i.seasoning) extras.push(`Seasoning: ${i.seasoning}`);
      if (i.spice)     extras.push(`Spice: ${i.spice}`);
      const detail = i.name + (extras.length ? ` (${extras.join(", ")})` : "");
      lines.push(`x${i.qty}  ${detail}  —  $${(getPrice(i.baseItem, i.size) * i.qty).toFixed(2)}`);
    });
    lines.push("─".repeat(44));
    lines.push(`TOTAL: $${total.toFixed(2)}`);
    if (notes) lines.push(`Notes: ${notes}`);
    return lines.join("\n");
  };

  const copySummary = async () => {
    const text = buildSummary();
    try { await navigator.clipboard.writeText(text); } catch {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    }
    alert("Order copied to clipboard!");
  };

  const resetOrder = () => {
    setOrderItems([]); setCustomerName(""); setCustomerPhone("");
    setNotes(""); setShowSummary(false); setPickupTime(""); setPickupAsap(false);
    setComboPickDrink(REFRESHMENT_OPTIONS[0].id);
    setComboPickFries("plum_fries"); setComboExpanded(false);
  };

  // Zoom controls
  const handleZoom = (direction) => {
    setZoomScale(prev => {
      let next = direction === "in" ? prev + 0.25 : prev - 0.25;
      if (next < 0.5) next = 0.5;
      if (next > 4) next = 4;
      return next;
    });
  };
  const handleResetZoom = () => {
    setZoomScale(1);
    setPanOffset({ x: 0, y: 0 });
  };

  // Drag and Pan handlers
  const handleMouseDown = (e) => {
    if (zoomScale <= 1) return;
    setIsPanning(true);
    dragStart.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
  };
  const handleMouseMove = (e) => {
    if (!isPanning || zoomScale <= 1) return;
    setPanOffset({
      x: e.clientX - dragStart.current.x,
      y: e.clientY - dragStart.current.y
    });
  };
  const handleMouseUpOrLeave = () => {
    setIsPanning(false);
  };

  // Styles dynamically adjusted by CSS variables
  const containerStyle = {
    display: "flex",
    flexDirection: "column",
    height: "100vh",
    background: "var(--bg-primary)",
    color: "var(--text-primary)",
    padding: "16px 20px",
  };

  const headerStyle = {
    display: "flex",
    justifyContent: "space-between",
    alignItems: "center",
    marginBottom: "16px",
    paddingBottom: "12px",
    borderBottom: "1.5px solid var(--border)",
  };

  const dashGridStyle = {
    display: "grid",
    gridTemplateColumns: "1.3fr 1.1fr 1.3fr",
    gap: "18px",
    height: "calc(100vh - 90px)",
    minHeight: "0", // key for enabling overflow scroll in child columns
  };

  const colCardStyle = {
    background: "var(--bg-card)",
    border: "1.5px solid var(--border)",
    borderRadius: "14px",
    boxShadow: "var(--shadow)",
    display: "flex",
    flexDirection: "column",
    height: "100%",
    overflow: "hidden",
  };

  const colHeaderStyle = {
    padding: "14px 16px",
    borderBottom: "1.5px solid var(--border)",
    background: "var(--bg-secondary)",
    display: "flex",
    justifyContent: "space-between",
    alignItems: "center",
  };

  const colBodyStyle = {
    padding: "16px",
    overflowY: "auto",
    flex: "1",
  };

  const buttonStyle = {
    padding: "6px 12px",
    borderRadius: "8px",
    border: "none",
    fontWeight: "600",
    cursor: "pointer",
    transition: "var(--transition)",
  };

  const forestBtn = {
    ...buttonStyle,
    background: "var(--brand-primary)",
    color: "#FFFFFF",
  };

  const secondaryBtn = {
    ...buttonStyle,
    background: "var(--bg-secondary)",
    color: "var(--text-primary)",
    border: "1.5px solid var(--border)",
  };

  const inputStyle = {
    width: "100%",
    padding: "9px 12px",
    borderRadius: "8px",
    border: "1.5px solid var(--border)",
    background: "var(--bg-primary)",
    color: "var(--text-primary)",
    transition: "var(--transition)",
    fontSize: "14px",
  };

  return (
    <div style={containerStyle}>

      {/* ── Dashboard Header ────────────────────────────────────────────── */}
      <header style={headerStyle}>
        <div>
          <h1 style={{ fontSize: "20px", fontWeight: "800", color: "var(--brand-primary)", display: "flex", alignItems: "center", gap: "8px" }}>
            <span>🍵</span> Sugar Brush Dashboard
          </h1>
          <p style={{ fontSize: "12px", color: "var(--text-secondary)", marginTop: "2px" }}>
            📅 {fmtDate(new Date())} &nbsp;·&nbsp; 🕐 {clockStr}
          </p>
        </div>
        <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
          {!IS_FRI_SUN && (
            <div style={{ background: "var(--accent-bg)", color: "var(--accent)", border: "1.5px solid var(--accent)", padding: "4px 10px", borderRadius: "20px", fontSize: "11px", fontWeight: "700" }}>
              ⚠️ Squid bowls & squid bites unavailable today
            </div>
          )}
          <button
            onClick={() => setDark(!dark)}
            style={{
              ...secondaryBtn,
              fontSize: "13px",
              padding: "5px 12px",
              borderRadius: "20px",
              display: "flex",
              alignItems: "center",
              gap: "5px"
            }}
          >
            {dark ? "☀️ Light" : "🌙 Dark"}
          </button>
        </div>
      </header>

      {/* ── Dashboard Content ──────────────────────────────────────────── */}
      <div style={dashGridStyle}>

        {/* ── COLUMN 1: INTERACTIVE ORDER FORM ─────────────────────────── */}
        <div style={colCardStyle}>
          <div style={colHeaderStyle}>
            <div style={{ display: "flex", alignItems: "center", gap: "8px", width: "100%" }}>
              <span style={{ fontSize: "18px" }}>📝</span>
              <div style={{ flex: 1 }}>
                <h2 style={{ fontSize: "15px", fontWeight: "700" }}>Menu Ordering</h2>
              </div>
              <input
                type="text"
                placeholder="🔍 Search items..."
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
                style={{
                  ...inputStyle,
                  width: "160px",
                  padding: "5px 10px",
                  fontSize: "12px",
                  borderRadius: "20px"
                }}
              />
            </div>
          </div>

          <div style={colBodyStyle}>
            {/* Customer Details Form */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px", marginBottom: "14px" }}>
              <div>
                <label style={{ fontSize: "11px", fontWeight: "700", textTransform: "uppercase", color: "var(--text-tertiary)" }}>Customer Name</label>
                <input
                  type="text"
                  placeholder="John Doe"
                  value={customerName}
                  onChange={e => setCustomerName(e.target.value)}
                  style={{ ...inputStyle, marginTop: "4px" }}
                />
              </div>
              <div>
                <label style={{ fontSize: "11px", fontWeight: "700", textTransform: "uppercase", color: "var(--text-tertiary)" }}>Phone Number</label>
                <input
                  type="tel"
                  placeholder="0400 000 000"
                  value={customerPhone}
                  onChange={e => setCustomerPhone(e.target.value)}
                  style={{ ...inputStyle, marginTop: "4px" }}
                />
              </div>
            </div>

            {/* Order Type Buttons */}

                        padding: "10px 12px",
                        background: "var(--bg-primary)"
                      }}>
                        <p style={{
                          fontSize: "11px",
                          fontWeight: "800",
                          textTransform: "uppercase",
                          color: "var(--brand-primary)",
                          marginBottom: "6px",
                          borderBottom: "1px dashed var(--border)",
                          paddingBottom: "3px"
                        }}>
                          {cat.label}
                        </p>
                        {cat.desc && !detailsSearch && (
                          <div style={{
                            fontSize: "11px",
                            fontStyle: "italic",
                            color: "var(--text-secondary)",
                            marginBottom: "8px",
                            display: "flex",
                            justifyContent: "space-between",
                            alignItems: "flex-start",
                            gap: "8px"
                          }}>
                            <span>{cat.desc}</span>
                            <button
                              onClick={() => { copyText(cat.desc); alert("Category info copied!"); }}
                              style={{
                                background: "none", border: "none", cursor: "pointer", fontSize: "11px", padding: "0 2px"
                              }}
                              title="Copy category description"
                            >
                              📋
                            </button>
                          </div>
                        )}

                        <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                          {matchingItems.map(item => (
                            <div key={item.id} style={{
                              background: "var(--bg-card)",
                              padding: "8px 10px",
                              borderRadius: "6px",
                              border: "1px solid var(--border)",
                              display: "flex",
                              flexDirection: "column",
                              gap: "2px"
                            }}>
                              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                <span style={{ fontWeight: "700", fontSize: "12px" }}>{item.name}</span>
                                <button
                                  onClick={() => { copyText(`${item.name}: ${item.desc}`); alert("Item details copied!"); }}
                                  style={{
                                    background: "none", border: "none", cursor: "pointer", fontSize: "11px"
                                  }}
                                  title="Copy details"
                                >
                                  📋 Copy
                                </button>
                              </div>
                              <span style={{ fontSize: "11px", color: "var(--text-secondary)" }}>{item.desc}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
