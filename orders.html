<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugar Brush — Phone Order</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f0f0f0; font-size: 15px; }
  body.dark { background: #111; }
  input, select, textarea, button { font-family: inherit; font-size: 15px; }
  select { cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const TODAY = new Date().toLocaleDateString("en-AU");

const MENU = {
  riceBowls: {
    label: "Rice bowls", icon: "🍚", askSize: true, askSauce: true, askSeasoning: true,
    items: [
      { id: "beef_bowl", name: "Beef bowl", prices: { S: 14.5, L: 16.5 } },
      { id: "lamb_bowl", name: "Lamb bowl", prices: { S: 14.5, L: 16.5 } },
      { id: "chicken_wing_bowl", name: "Chicken wing bowl", prices: { S: 15.9, L: 17.9 } },
      { id: "squid_bowl", name: "Squid bowl (Fri–Sun only)", prices: { L: 19.5 }, noSmall: true },
    ],
  },
  sides: {
    label: "On the side", icon: "➕",
    items: [
      { id: "tare_sauce", name: "House-made tare sauce", prices: { one: 2 } },
      { id: "spicy_mayo", name: "Spicy mayo", prices: { one: 2 } },
      { id: "pickled_radish", name: "Pickled radish", prices: { one: 2 } },
      { id: "extra_spices", name: "Extra spices", prices: { one: 2 } },
    ],
  },
  melts: {
    label: "Melts", icon: "🥪", note: "served with potato chips",
    items: [
      { id: "pastrami_melt", name: "Pastrami melt", prices: { one: 14 } },
      { id: "cheesy_tuna_melt", name: "Cheesy tuna melt", prices: { one: 14 } },
      { id: "smokey_pesto_melt", name: "Smokey pesto melt", prices: { one: 14 } },
      { id: "ham_cheese_melt", name: "Ham cheese melt", prices: { one: 8 } },
    ],
  },
  bites: {
    label: "Bites & sides", icon: "🍗", askSpice: true,
    items: [
      { id: "beef_bites", name: "Beef bites", prices: { one: 8.5 } },
      { id: "lamb_bites", name: "Lamb bites", prices: { one: 8.5 } },
      { id: "chicken_wings", name: "Chicken wings (6x)", prices: { one: 9.9 } },
      { id: "fried_squid", name: "Fried squid (Fri–Sun only)", prices: { one: 12.9 } },
      { id: "spring_rolls", name: "Spring rolls (6x)", prices: { one: 12 } },
      { id: "plum_fries", name: "Plum fries", prices: { one: 5 } },
      { id: "sweet_potato_fries", name: "Sweet potato fries", prices: { one: 7 } },
      { id: "nem_nuong", name: "Nem nuong", prices: { one: 6 } },
      { id: "bo_la_lot", name: "Bo la lot", prices: { one: 6 } },
    ],
  },
  combo: {
    label: "Combo deal", icon: "🏷️",
    items: [{ id: "combo", name: "Fries + Any small refreshment", prices: { one: 8 } }],
  },
  matcha: {
    label: "Kohiki matcha", icon: "🍵", askSize: true,
    items: [
      { id: "iced_matcha", name: "Iced matcha", prices: { S: 7.5, L: 9.5 } },
      { id: "iced_strawberry_matcha", name: "Iced strawberry matcha", prices: { S: 8.5, L: 10.5 } },
      { id: "iced_jasmine_matcha", name: "Iced jasmine matcha", prices: { S: 8.5, L: 10.5 } },
      { id: "iced_coconut_matcha", name: "Iced coconut matcha", prices: { S: 8.5, L: 10.5 } },
    ],
  },
  refreshments: {
    label: "Refreshments", icon: "🥤", askSize: true,
    items: [
      { id: "mint_lemonade", name: "Mint lemonade", prices: { S: 4.5, L: 5.7 } },
      { id: "mint_straw_lemonade", name: "Mint strawberry lemonade", prices: { S: 5.5, L: 6.7 } },
      { id: "iced_lychee", name: "Iced lychee", prices: { S: 6, L: 7.2 } },
      { id: "iced_jasmine_tea", name: "Iced jasmine tea", prices: { S: 6, L: 7.2 } },
      { id: "iced_straw_jasmine", name: "Iced strawberry jasmine tea", prices: { S: 6, L: 7.2 } },
      { id: "viet_iced_coffee", name: "Vietnamese iced coffee", prices: { S: 6, L: 8 } },
    ],
  },
  toppings: {
    label: "Toppings", icon: "🌿",
    items: [
      { id: "aloe_vera", name: "Aloe vera", prices: { one: 0.8 } },
      { id: "lychee_popping_pearls", name: "Lychee popping pearls", prices: { one: 0.8 } },
      { id: "rainbow_jelly", name: "Rainbow jelly", prices: { one: 0.8 } },
      { id: "herbal_jelly", name: "Herbal jelly", prices: { one: 0.8 } },
    ],
  },
};

const FRIES_IDS = new Set(["plum_fries", "sweet_potato_fries"]);

const REFRESHMENT_OPTIONS = [
  { id: "mint_lemonade", name: "Mint lemonade" },
  { id: "mint_straw_lemonade", name: "Mint strawberry lemonade" },
  { id: "iced_lychee", name: "Iced lychee" },
  { id: "iced_jasmine_tea", name: "Iced jasmine tea" },
  { id: "iced_straw_jasmine", name: "Iced strawberry jasmine tea" },
  { id: "viet_iced_coffee", name: "Vietnamese iced coffee" },
];

function getPrice(item, size) {
  if (item.prices.one !== undefined) return item.prices.one;
  return item.prices[size] || 0;
}

function App() {
  const [customerName, setCustomerName] = useState("");
  const [customerPhone, setCustomerPhone] = useState("");
  const [orderType, setOrderType] = useState("pickup");
  const [orderItems, setOrderItems] = useState([]);
  const [notes, setNotes] = useState("");
  const [showSummary, setShowSummary] = useState(false);
  const [dark, setDark] = useState(false);
  const [comboPickDrink, setComboPickDrink] = useState(REFRESHMENT_OPTIONS[0].id);
  const [comboPickFries, setComboPickFries] = useState("plum_fries");
  const [comboExpanded, setComboExpanded] = useState(false);

  const FRIES_OPTIONS = [
    { id: "plum_fries", name: "Plum fries" },
    { id: "sweet_potato_fries", name: "Sweet potato fries" },
  ];

  React.useEffect(() => {
    document.body.className = dark ? "dark" : "";
  }, [dark]);

  const C = dark ? {
    bg: "#1e1e1e", bgSec: "#2a2a2a", text: "#f0f0f0", textSec: "#bbbbbb",
    textTer: "#777", danger: "#ff6b6b", border: "#555", borderTer: "#3a3a3a",
  } : {
    bg: "#fff", bgSec: "#f7f7f7", text: "#111", textSec: "#555",
    textTer: "#888", danger: "#c62828", border: "#bbb", borderTer: "#e0e0e0",
  };

  const addItem = (item, cat) => {
    const hasSize = !!cat.askSize;
    const defaultSize = item.noSmall ? "L" : hasSize ? "S" : null;
    setOrderItems(prev => [...prev, {
      id: Date.now() + Math.random(),
      itemId: item.id, name: item.name, category: cat.label,
      size: defaultSize,
      sauce: cat.askSauce ? "Tare" : null,
      seasoning: cat.askSeasoning ? "Cumin" : null,
      spice: cat.askSpice ? "Cumin" : null,
      qty: 1, baseItem: item,
      hasSize, hasSauce: !!cat.askSauce,
      hasSeasoning: !!cat.askSeasoning, hasSpice: !!cat.askSpice,
    }]);
  };

  const removeItem = id => setOrderItems(prev => prev.filter(i => i.id !== id));
  const updateItem = (id, field, value) => setOrderItems(prev => prev.map(i => i.id === id ? { ...i, [field]: value } : i));
  const total = orderItems.reduce((sum, i) => sum + getPrice(i.baseItem, i.size) * i.qty, 0);

  const buildSummary = () => {
    const lines = [
      `ORDER SUMMARY — ${TODAY}`,
      `Customer: ${customerName || "—"}  |  Phone: ${customerPhone || "—"}`,
      `Order type: ${orderType === "pickup" ? "Pick up" : "Dine in"}`,
      "─".repeat(40),
    ];
    orderItems.forEach(i => {
      const extras = [];
      if (i.size) extras.push(i.size === "S" ? "Small" : "Large");
      if (i.sauce) extras.push(`Sauce: ${i.sauce}`);
      if (i.seasoning) extras.push(`Seasoning: ${i.seasoning}`);
      if (i.spice) extras.push(`Spice: ${i.spice}`);
      const detail = i.name + (extras.length ? ` (${extras.join(", ")})` : "");
      lines.push(`x${i.qty}  ${detail}  —  $${(getPrice(i.baseItem, i.size) * i.qty).toFixed(2)}`);
    });
    lines.push("─".repeat(40));
    lines.push(`TOTAL: $${total.toFixed(2)}`);
    if (notes) lines.push(`Notes: ${notes}`);
    return lines.join("\n");
  };

  const copySummary = async () => {
    const text = buildSummary();
    try { await navigator.clipboard.writeText(text); } catch {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand("copy"); document.body.removeChild(ta);
    }
    alert("Order copied!");
  };

  const resetOrder = () => {
    setOrderItems([]); setCustomerName(""); setCustomerPhone("");
    setNotes(""); setShowSummary(false); setComboPickDrink(REFRESHMENT_OPTIONS[0].id); setComboPickFries("plum_fries"); setComboExpanded(false);
  };

  // Sizes scaled up across the board
  const card = {
    background: C.bg,
    border: `1px solid ${C.borderTer}`,
    borderRadius: 10,
    padding: "8px 12px",
    marginBottom: 7,
  };

  const secTitle = {
    fontSize: 13,
    fontWeight: 700,
    color: C.textSec,
    margin: "0 0 5px",
    display: "flex",
    alignItems: "center",
    gap: 6,
    paddingBottom: 4,
    borderBottom: `1px solid ${C.borderTer}`,
    textTransform: "uppercase",
    letterSpacing: "0.06em",
  };

  const btnAdd = {
    fontSize: 14,
    padding: "4px 11px",
    cursor: "pointer",
    background: "#EAF3DE",
    color: "#1d4407",
    border: "1px solid #7fb23f",
    borderRadius: 6,
    fontWeight: 600,
    lineHeight: 1.4,
    whiteSpace: "nowrap",
  };

  const sel = {
    fontSize: 14,
    padding: "3px 6px",
    borderRadius: 6,
    border: `1px solid ${C.border}`,
    background: C.bgSec,
    color: C.text,
  };

  const smLabel = {
    fontSize: 13,
    color: C.textTer,
    fontWeight: 500,
  };

  const inputSt = {
    width: "100%",
    fontSize: 15,
    padding: "7px 10px",
    border: `1px solid ${C.border}`,
    borderRadius: 7,
    background: C.bg,
    color: C.text,
  };

  return (
    <div style={{ padding: "12px 14px", minHeight: "100vh" }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 6 }}>
        <span style={{ fontSize: 17, fontWeight: 700, color: C.text }}>📞 Phone order — Sugar Brush</span>
        <div style={{ display: "flex", gap: 6 }}>
          <button onClick={() => setDark(d => !d)} style={{ fontSize: 14, padding: "5px 11px", background: dark ? "#f0f0f0" : "#222", color: dark ? "#222" : "#fff", border: "none", borderRadius: 7, fontWeight: 600, cursor: "pointer" }}>
            {dark ? "☀️ Light" : "🌙 Dark"}
          </button>
          <a href="https://drive.google.com/file/d/1_eELe6FgHsTosJo9vwHHyhqw3AJq8jPk/view?usp=sharing" target="_blank" rel="noopener noreferrer"
            style={{ fontSize: 14, padding: "5px 11px", background: "#1E3A1E", color: "#fff", borderRadius: 7, textDecoration: "none", fontWeight: 600 }}>
            📋 Menu
          </a>
        </div>
      </div>

      {/* Customer info */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
        {[["Name","text",customerName,setCustomerName,"e.g. John"],["Phone","tel",customerPhone,setCustomerPhone,"0412 345 678"]].map(([lbl,type,val,set,ph]) => (
          <div key={lbl}>
            <label style={{ ...smLabel, display: "block", marginBottom: 3 }}>{lbl}</label>
            <input type={type} value={val} onChange={e => set(e.target.value)} placeholder={ph} style={inputSt} />
          </div>
        ))}
      </div>

      {/* Order type */}
      <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
        {["pickup","dinein"].map(type => (
          <button key={type} onClick={() => setOrderType(type)} style={{
            flex: 1, padding: "7px", fontSize: 15, cursor: "pointer", borderRadius: 7,
            fontWeight: orderType === type ? 700 : 500,
            background: orderType === type ? (type === "pickup" ? "#EAF3DE" : "#E6F1FB") : C.bgSec,
            color: orderType === type ? (type === "pickup" ? "#1d4407" : "#0C447C") : C.textSec,
            border: orderType === type ? `1.5px solid ${type === "pickup" ? "#7fb23f" : "#85B7EB"}` : `1px solid ${C.borderTer}`,
          }}>
            {type === "pickup" ? "🛍 Pick up" : "🪑 Dine in"}
          </button>
        ))}
      </div>

      {/* Two-column layout */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(300px,1fr))", gap: 14 }}>

        {/* Menu */}
        <div>
          <p style={{ fontSize: 13, fontWeight: 700, color: C.textTer, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.06em" }}>Menu</p>
          {Object.entries(MENU).map(([key, cat]) => (
            <div key={key} style={card}>
              <p style={secTitle}>
                <span>{cat.icon}</span> {cat.label}
                {cat.note && <span style={{ fontSize: 12, fontWeight: 400, color: C.textTer }}> — {cat.note}</span>}
              </p>
              {cat.askSpice && <p style={{ fontSize: 13, color: C.textTer, margin: "0 0 5px" }}>Spice: Sichuan 0 / 1 / 2 or Cumin</p>}
              {cat.items.map(item => {
                const isCombo = item.id === "combo";
                const priceStr = item.prices.one !== undefined
                  ? `$${item.prices.one}`
                  : item.noSmall
                    ? `L $${item.prices.L}`
                    : `S $${item.prices.S} / L $${item.prices.L}`;

                if (isCombo) return (
                  <div key={item.id} style={{ padding: "6px 0" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 15, color: C.text, fontWeight: 500 }}>{item.name}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                        <span style={{ fontSize: 14, color: C.textSec, fontWeight: 600, minWidth: 80, textAlign: "right" }}>$8</span>
                        <button style={btnAdd} onClick={() => setComboExpanded(e => !e)}>
                          {comboExpanded ? "▲ Close" : "+ Add"}
                        </button>
                      </div>
                    </div>
                    {comboExpanded && (
                      <div style={{ marginTop: 8, background: dark ? "#2a2a2a" : "#f9f9f9", border: `1px solid ${C.borderTer}`, borderRadius: 8, padding: "10px 10px 8px" }}>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 8 }}>
                          <div style={{ flex: 1, minWidth: 130 }}>
                            <p style={{ ...smLabel, marginBottom: 4 }}>Fries</p>
                            <select value={comboPickFries} onChange={e => setComboPickFries(e.target.value)} style={{ ...sel, width: "100%" }}>
                              {FRIES_OPTIONS.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                            </select>
                          </div>
                          <div style={{ flex: 1, minWidth: 160 }}>
                            <p style={{ ...smLabel, marginBottom: 4 }}>Refreshment (S)</p>
                            <select value={comboPickDrink} onChange={e => setComboPickDrink(e.target.value)} style={{ ...sel, width: "100%" }}>
                              {REFRESHMENT_OPTIONS.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                            </select>
                          </div>
                        </div>
                        <button onClick={() => {
                          const friesName = FRIES_OPTIONS.find(f => f.id === comboPickFries)?.name;
                          const drinkName = REFRESHMENT_OPTIONS.find(r => r.id === comboPickDrink)?.name;
                          addItem({ ...item, name: `Combo: ${friesName} + ${drinkName} (S)` }, cat);
                          setComboExpanded(false);
                        }} style={{ width: "100%", padding: "6px", fontSize: 14, cursor: "pointer", background: "#EF9F27", color: "#fff", border: "none", borderRadius: 7, fontWeight: 700 }}>
                          ✓ Add combo — $8
                        </button>
                      </div>
                    )}
                  </div>
                );

                return (
                  <div key={item.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${C.borderTer}` }}>
                    <span style={{ fontSize: 15, color: C.text, fontWeight: 500, paddingRight: 8 }}>{item.name}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                      <span style={{ fontSize: 14, color: C.textSec, fontWeight: 600, minWidth: 80, textAlign: "right" }}>{priceStr}</span>
                      <button style={btnAdd} onClick={() => addItem(item, cat)}>+ Add</button>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
        </div>

        {/* Order */}
        <div>
          <p style={{ fontSize: 13, fontWeight: 700, color: C.textTer, margin: "0 0 6px", textTransform: "uppercase", letterSpacing: "0.06em" }}>
            Order
            {orderItems.length > 0 && <span style={{ background: "#EAF3DE", color: "#1d4407", fontSize: 12, padding: "1px 8px", borderRadius: 20, marginLeft: 6, fontWeight: 700 }}>{orderItems.length}</span>}
          </p>


          {orderItems.length === 0 && (
            <div style={{ ...card, textAlign: "center", padding: "1.8rem", color: C.textTer, fontSize: 15 }}>
              🛒 No items yet
            </div>
          )}

          {orderItems.map(oi => {
            const price = getPrice(oi.baseItem, oi.size);
            return (
              <div key={oi.id} style={card}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                  <div>
                    <p style={{ margin: 0, fontSize: 15, fontWeight: 600, color: C.text }}>{oi.name}</p>
                    <p style={{ margin: "1px 0 0", fontSize: 13, color: C.textTer }}>{oi.category}</p>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 16, fontWeight: 700, color: C.text }}>${(price * oi.qty).toFixed(2)}</span>
                    <button onClick={() => removeItem(oi.id)} style={{ background: "none", border: "none", cursor: "pointer", color: C.danger, padding: 0, fontSize: 18, lineHeight: 1 }}>🗑</button>
                  </div>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    <span style={smLabel}>Qty</span>
                    <button onClick={() => oi.qty > 1 && updateItem(oi.id, "qty", oi.qty - 1)} style={{ ...sel, padding: "2px 9px", cursor: "pointer", fontWeight: 700 }}>−</button>
                    <span style={{ fontSize: 15, fontWeight: 700, minWidth: 20, textAlign: "center", color: C.text }}>{oi.qty}</span>
                    <button onClick={() => updateItem(oi.id, "qty", oi.qty + 1)} style={{ ...sel, padding: "2px 9px", cursor: "pointer", fontWeight: 700 }}>+</button>
                  </div>
                  {oi.hasSize && !oi.baseItem.noSmall && (
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={smLabel}>Size</span>
                      <select value={oi.size} onChange={e => updateItem(oi.id, "size", e.target.value)} style={sel}>
                        <option value="S">S</option><option value="L">L</option>
                      </select>
                    </div>
                  )}
                  {oi.hasSauce && (
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={smLabel}>Sauce</span>
                      <select value={oi.sauce} onChange={e => updateItem(oi.id, "sauce", e.target.value)} style={sel}>
                        <option>Tare</option><option>Soy & Mirin</option>
                      </select>
                    </div>
                  )}
                  {oi.hasSeasoning && (
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={smLabel}>Season</span>
                      <select value={oi.seasoning} onChange={e => updateItem(oi.id, "seasoning", e.target.value)} style={sel}>
                        <option>Cumin</option><option>Sichuan</option>
                      </select>
                    </div>
                  )}
                  {oi.hasSpice && (
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={smLabel}>Spice</span>
                      <select value={oi.spice} onChange={e => updateItem(oi.id, "spice", e.target.value)} style={sel}>
                        <option>Cumin</option><option>Sichuan 0</option><option>Sichuan 1</option><option>Sichuan 2</option>
                      </select>
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {orderItems.length > 0 && (
            <>
              <div style={{ ...card, background: C.bgSec, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px" }}>
                <span style={{ fontSize: 16, fontWeight: 700, color: C.text }}>Total</span>
                <span style={{ fontSize: 22, fontWeight: 800, color: C.text }}>${total.toFixed(2)}</span>
              </div>
              <div style={{ marginBottom: 8 }}>
                <label style={{ ...smLabel, display: "block", marginBottom: 3 }}>Notes</label>
                <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Special requests..." rows={2}
                  style={{ ...inputSt, resize: "none" }} />
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={() => setShowSummary(s => !s)} style={{ flex: 1, padding: "8px", fontSize: 14, cursor: "pointer", background: "#EAF3DE", color: "#1d4407", border: "1px solid #7fb23f", borderRadius: 7, fontWeight: 600 }}>
                  👁 {showSummary ? "Hide" : "View"}
                </button>
                <button onClick={copySummary} style={{ flex: 1, padding: "8px", fontSize: 14, cursor: "pointer", background: "#E6F1FB", color: "#0C447C", border: "1px solid #85B7EB", borderRadius: 7, fontWeight: 600 }}>
                  📋 Copy
                </button>
                <button onClick={resetOrder} style={{ padding: "8px 12px", fontSize: 14, cursor: "pointer", background: "#FCEBEB", color: "#791F1F", border: "1px solid #F09595", borderRadius: 7, fontWeight: 600 }}>
                  🔄
                </button>
              </div>
              {showSummary && (
                <div style={{ marginTop: 8, background: C.bgSec, border: `1px solid ${C.borderTer}`, borderRadius: 7, padding: "10px 12px" }}>
                  <pre style={{ fontSize: 13, margin: 0, whiteSpace: "pre-wrap", color: C.text, fontFamily: "monospace", lineHeight: 1.6 }}>{buildSummary()}</pre>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
