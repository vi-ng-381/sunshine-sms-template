<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Orders</title>
</head>

<body>

<h1>Sugar Brush Cafe Orders</h1>

<style>
body{
  font-family:Arial;
  padding:20px;
  background:#f5f5f5;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  max-width:500px;
  margin-top:20px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:8px;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  background:black;
  color:white;
  cursor:pointer;
}
</style>

<div class="card">

  <h2>Create Order</h2>

  <input placeholder="Customer Name">

  <textarea placeholder="Order Details"></textarea>

  <button>
    Submit Order
  </button>

</div>

</body>
</html>
