<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sunshine Badminton SMS Templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root{
  --bg:#F4F1EB;
  --surface:#FFFFFF;
  --sidebar:#FDFBF7;
  --border:#E2DDD4;
  --text:#1A1714;
  --muted:#8B8178;
  --accent:#D4691E;
  --accent-soft:#FAE8D8;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',sans-serif;
  --display:'Syne',sans-serif;
}
body.dark{
  --bg:#110F0D;
  --surface:#1C1916;
  --sidebar:#161310;
  --border:#2E2A25;
  --text:#F0EDE7;
  --muted:#7A7068;
  --accent:#E07A30;
  --accent-soft:#2A1A0A;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--sans);
  font-size:14px;
  background:var(--bg);
  color:var(--text);
  padding:24px;
  min-height:100vh;
  transition:background .25s,color .25s;
}
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:760px;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  background:var(--surface);
  box-shadow:0 2px 40px rgba(0,0,0,.07);
}
/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  background:var(--sidebar);
  display:flex;
  flex-direction:column;
}
.sidebar-head{
  padding:20px 16px 12px;
  border-bottom:1px solid var(--border);
}
.sidebar-logo{
  font-family:var(--display);
  font-size:15px;
  font-weight:800;
  letter-spacing:-.01em;
  color:var(--text);
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:12px;
}
.logo-dot{
  width:8px;height:8px;
  border-radius:50%;
  background:var(--accent);
}
.search-wrap{
  position:relative;
}
.search-wrap i{
  position:absolute;left:10px;top:50%;
  transform:translateY(-50%);
  color:var(--muted);font-size:14px;
}
.search-input{
  width:100%;
  padding:9px 10px 9px 32px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--text);
  font-family:var(--sans);
  font-size:13px;
  outline:none;
  transition:border-color .15s;
}
.search-input:focus{border-color:var(--accent);}
.nav-body{
  flex:1;
  overflow-y:auto;
  padding:8px 10px 16px;
}
.nav-cat{
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  color:var(--muted);
  letter-spacing:.08em;
  text-transform:uppercase;
  padding:14px 8px 6px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:9px;
  padding:9px 10px;
  border-radius:8px;
  cursor:pointer;
  color:var(--muted);
  font-size:13px;
  font-family:var(--sans);
  font-weight:500;
  transition:background .12s,color .12s;
  position:relative;
}
.nav-item:hover{background:var(--accent-soft);color:var(--text);}
.nav-item.active{
  background:var(--accent);
  color:#fff;
}
.nav-item.active i{color:#fff;}
.nav-item i{font-size:15px;flex-shrink:0;}
/* MAIN */
.main{display:flex;flex-direction:column;}
.topbar{
  padding:18px 24px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.topbar-left{display:flex;align-items:center;gap:12px;}
.topbar-title{
  font-family:var(--display);
  font-size:17px;
  font-weight:700;
  letter-spacing:-.02em;
}
.badge{
  font-family:var(--mono);
  font-size:10px;
  font-weight:500;
  padding:4px 10px;
  border-radius:999px;
  letter-spacing:.04em;
}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:34px;height:34px;
  border:1px solid var(--border);
  border-radius:8px;
  background:transparent;
  color:var(--text);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;
  transition:background .15s,border-color .15s;
}
.icon-btn:hover{background:var(--accent-soft);border-color:var(--accent);}
/* CONTENT */
.content{
  padding:24px;
  display:flex;
  flex-direction:column;
  gap:18px;
  flex:1;
}
.empty-state{
  flex:1;display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  color:var(--muted);
}
.empty-state i{font-size:40px;opacity:.3;}
.empty-state p{font-family:var(--mono);font-size:13px;}
/* FIELDS */
.field-row{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:12px;
}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{
  font-family:var(--mono);
  font-size:11px;
  color:var(--muted);
  letter-spacing:.04em;
  text-transform:uppercase;
}
.field input{
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:13px;
  outline:none;
  transition:border-color .15s;
}
.field input:focus{border-color:var(--accent);}
/* PREVIEW */
.preview-wrap{flex:1;}
.preview-label{
  font-family:var(--mono);
  font-size:10px;
  color:var(--muted);
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.char-badge{
  font-size:10px;
  color:var(--muted);
  font-family:var(--mono);
}
.preview-box{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  padding:16px;
  font-family:var(--mono);
  font-size:12.5px;
  line-height:1.8;
  white-space:pre-wrap;
  min-height:200px;
  color:var(--text);
}
.preview-box a{color:var(--accent);}
/* ACTIONS */
.action-row{display:flex;gap:10px;}
.btn-copy{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:#fff;
  font-family:var(--display);
  font-weight:700;
  font-size:13px;
  letter-spacing:.01em;
  display:flex;align-items:center;gap:7px;
  transition:opacity .15s;
}
.btn-copy:hover{opacity:.88;}
.btn-reset{
  padding:10px 14px;
  border:1px solid var(--border);
  border-radius:8px;
  background:transparent;
  color:var(--muted);
  font-family:var(--sans);
  font-size:13px;
  transition:border-color .15s,color .15s;
}
.btn-reset:hover{border-color:var(--accent);color:var(--text);}
/* RESTRING TABLE */
.restring-card{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:10px;
  padding:20px;
  overflow-x:auto;
}
.restring-card h2{
  font-family:var(--display);
  font-size:16px;
  font-weight:700;
  margin-bottom:16px;
}
.restring-table{
  width:100%;border-collapse:collapse;min-width:400px;
}
.restring-table th{
  font-family:var(--mono);
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:.06em;
  color:var(--muted);
  padding:10px 12px;
  border-bottom:1px solid var(--border);
  text-align:left;
  font-weight:500;
}
.restring-table td{
  padding:10px 12px;
  font-size:13px;
  border-bottom:1px solid var(--border);
  color:var(--text);
}
.restring-table tr:last-child td{border-bottom:none;}
.restring-table tr:hover td{background:var(--accent-soft);}
/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--text);color:var(--bg);
  font-family:var(--mono);font-size:12px;
  padding:10px 18px;border-radius:8px;
  opacity:0;transform:translateY(8px);
  transition:opacity .2s,transform .2s;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translateY(0);}
@media(max-width:720px){
  body{padding:12px;}
  .app{grid-template-columns:1fr;}
  .sidebar{border-right:none;border-bottom:1px solid var(--border);}
  .field-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-logo">
        <span class="logo-dot"></span>
        SMS Templates
      </div>
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input id="search" class="search-input" placeholder="Search templates…" oninput="filterTemplates(this.value)">
      </div>
    </div>
    <div class="nav-body" id="nav"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="top-title">Sunshine Badminton</span>
        <span class="badge" id="top-badge"></span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="themeToggle" onclick="toggleTheme()" title="Toggle theme" style="font-size:16px;">🌙</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <i class="ti ti-message-circle"></i>
        <p>Select a template to get started</p>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast">Copied to clipboard</div>

<script>
const SIGN = `Sunshine Badminton × Sugar Brush Cafe\nhttps://sunshinebadminton.com.au`;

const templates = [

},

  badge:{text:"Booking",bg:"#DDEEFF",color:"#1A4A80"},
  fields:[
    {id:"name",label:"Customer name",placeholder:""},
    {id:"date",label:"Date",placeholder:""},
    {id:"court",label:"New court",placeholder:""},
    {id:"time",label:"New time",placeholder:""}
  ],
  build:(f)=>`Hi ${f.name||"[Name]"},

We've adjusted your booking for ${f.date||"[date]"} — you'll be on Court ${f.court||"[#]"} from ${f.time||"[time]"} for the full session.

${SIGN}`
},
{
  id:"cancel",cat:"Cancellation",icon:"ti-circle-x",label:"Cancel + refund",
  badge:{text:"Cancel",bg:"#FDECEA",color:"#8B2020"},
  fields:[
    {id:"name",label:"Customer name",placeholder:""},
    {id:"court",label:"Court number",placeholder:""},
    {id:"date",label:"Date",placeholder:""},
    {id:"time",label:"Booking time",placeholder:""}
  ],
  build:(f)=>`Hi ${f.name||"[Name]"},

Your booking on Court ${f.court||"[#]"} (${f.date||"[date]"}, ${f.time||"[time]"}) has been cancelled.

Your refund will be returned within 5–7 business days.

},
{
  id:"website",cat:"Info",icon:"ti-world",label:"Website & hours",
  badge:{text:"Info",bg:"#E2F5EC",color:"#145C38"},
  fields:[{id:"name",label:"Customer name",placeholder:""}],
  build:(f)=>`Hi ${f.name||"there"},

You can book online anytime at:
https://sunshinebadminton.com.au

Opening hours:
6:00 AM – 11:00 PM

Staffed hours:

Sat–Sun: 9:00 AM – 11:00 PM

${SIGN}`
},
{

  badge:{text:"Info",bg:"#E2F5EC",color:"#145C38"},
  fields:[{id:"name",label:"Customer name",placeholder:""}],
  build:(f)=>`Hi ${f.name||"there"},

Here's a quick overview of our membership:

• $50/year

• Free shuttle machine access

${SIGN}`
},
{
  id:"restring-options",cat:"Info",icon:"ti-list",label:"Restringing options",
  badge:{text:"Info",bg:"#E2F5EC",color:"#145C38"},
  fields:[],tableOnly:true,
  build:()=>``
},
{
  id:"restring",cat:"Info",icon:"ti-tool",label:"Restringing price",
  badge:{text:"Info",bg:"#E2F5EC",color:"#145C38"},
  fields:[{id:"name",label:"Customer name",placeholder:""}],
  build:(f)=>`Hi ${f.name||"there"},

Our restringing prices:

},
{
  id:"shuttlecock",cat:"Info",icon:"ti-shopping-bag",label:"Shuttlecock prices",
  badge:{text:"Shop",bg:"#EEF6E2",color:"#2F5A10"},
  fields:[{id:"name",label:"Customer name",placeholder:"e.g. there"}],
  build:(f)=>`Hi ${f.name||"there"},

Yes, we sell shuttlecocks 🏸

• Chaopai Silver — $3.50 each / $38 per tube

${SIGN}`
},
{
  id:"coaching",cat:"Coaching",icon:"ti-user-star",label:"Coach contacts",
  badge:{text:"Coaching",bg:"#EEEDFE",color:"#3C3489"},
  fields:[],
  build:()=>`Hi there,

Our coaches' contact details:

${SIGN}`
},
{
  id:"social",cat:"Social",icon:"ti-users",label:"Social weekly schedule",
  badge:{text:"Social",bg:"#FFF3E0",color:"#8B4D00"},
  fields:[{id:"name",label:"Customer name",placeholder:""}],
  build:(f)=>`Hi ${f.name||"there"}!

🏸 Sunshine Badminton – Social Schedule

• 7:30–10:00 PM: Lam Thi (Mixed) – 0481 164 235

• 7:30–10:00 PM: NP Social (Mixed) – 0426 789 222

Thursday
• 7:30–10:00 PM: Luong Ly Social (Mixed) – 0433 964 199

Friday
• 7:30–10:00 PM: Lam Thi (Mixed) – 0481 164 235
• 7:30–10:30 PM: Anh Pham (Intermediate) – 0420 485 712

Saturday
• 2:00–4:00 PM: Rowel Mira (Mixed) – 0481 874 500
• 4:00–7:00 PM: Patrick & Ngoc (Mixed) – 0418 377 311

Sunday
• 11:00 AM–1:00 PM: NP Social (Mixed) – 0481 810 370
• 6:00–9:00 PM: Quoc Hung (Advanced) – 0466 128 158

${SIGN}`
}
];

let current = null;
const fieldVals = {};

function buildNav(){
  const cats = [...new Set(templates.map(t=>t.cat))];
  const nav = document.getElementById("nav");
  nav.innerHTML="";
  cats.forEach(cat=>{
    const wrap = document.createElement("div");
    wrap.innerHTML=`<div class="nav-cat">${cat}</div>`;
    templates.filter(t=>t.cat===cat).forEach(t=>{
      const el=document.createElement("div");
      el.className="nav-item";
      el.id="nav-"+t.id;
      el.innerHTML=`<i class="ti ${t.icon}"></i>${t.label}`;
      el.onclick=()=>selectTemplate(t.id);
      wrap.appendChild(el);
    });
    nav.appendChild(wrap);
  });
}

function selectTemplate(id){
  current=templates.find(t=>t.id===id);
  localStorage.setItem("lastTemplate",id);
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  document.getElementById("nav-"+id).classList.add("active");
  document.getElementById("top-title").textContent=current.label;
  const badge=document.getElementById("top-badge");
  badge.textContent=current.badge.text;
  badge.style.background=current.badge.bg;
  badge.style.color=current.badge.color;
  renderContent();
}

function renderContent(){
  if(!current)return;
  const c=document.getElementById("content");
  const vals=fieldVals[current.id]||{};
  let html="";

  if(current.tableOnly){
    html=`
    <div class="restring-card">
      <h2>🏸 Restringing Options & Colours</h2>
      <table class="restring-table">
        <tr><th>Brand</th><th>String</th><th>Colours</th></tr>
        <tr><td>Yonex</td><td>BG 65</td><td>White</td></tr>
        <tr><td>Yonex</td><td>BG 65TI</td><td>White</td></tr>
        <tr><td>Yonex</td><td>BG 80</td><td>Blue, Yellow</td></tr>
        <tr><td>Yonex</td><td>BG 80 Power</td><td>White</td></tr>
        <tr><td>Yonex</td><td>BG 66 Ultimax</td><td>Navy, Red</td></tr>
        <tr><td>Yonex</td><td>Nano 95</td><td>Yellow, White</td></tr>
        <tr><td>Yonex</td><td>Nano 98</td><td>Yellow</td></tr>
        <tr><td>Yonex</td><td>Exbolt 63</td><td>Blue, Pink</td></tr>
        <tr><td>Yonex</td><td>Exbolt 65</td><td>Yellow, Purple</td></tr>
        <tr><td>Yonex</td><td>Exbolt 68</td><td>Yellow, Green</td></tr>
        <tr><td>Yonex</td><td>Aerobite</td><td>Red</td></tr>
        <tr><td>Li-Ning</td><td>No1</td><td>Yellow</td></tr>
      </table>
    </div>`;
    c.innerHTML=html;
    return;
  }

  if(current.fields.length){
    html+=`<div class="field-row">`;
    current.fields.forEach(f=>{
      html+=`<div class="field"><label>${f.label}</label><input type="text" value="${vals[f.id]||""}" placeholder="${f.placeholder||""}" oninput="onField('${f.id}',this.value)"></div>`;
    });
    html+=`</div>`;
  }

  const msg=current.build(vals);
  const len=msg.replace(/<[^>]+>/g,"").length;

  html+=`
  <div class="preview-wrap">
    <div class="preview-label">
      <span>Message preview</span>
      <span class="char-badge" id="char-count">${len} chars</span>
    </div>
    <div class="preview-box" id="preview">${msg}</div>
  </div>
  <div class="action-row">
    <button class="btn-copy" onclick="copyMsg()">
      <i class="ti ti-copy"></i> Copy message
    </button>
    <button class="btn-reset" onclick="resetFields()">Reset</button>
  </div>`;
  c.innerHTML=html;
}

function onField(id,val){
  if(!fieldVals[current.id]) fieldVals[current.id]={};
  fieldVals[current.id][id]=val;
  const msg=current.build(fieldVals[current.id]);
  document.getElementById("preview").innerHTML=msg;
  const len=msg.replace(/<[^>]+>/g,"").length;
  document.getElementById("char-count").textContent=`${len} chars`;
}

function resetFields(){
  fieldVals[current.id]={};
  renderContent();
}

async function copyMsg(){
  const vals=fieldVals[current.id]||{};
  const msg=current.build(vals);
  const plain=msg.replace(/<[^>]+>/g,"");
  await navigator.clipboard.writeText(plain);
  showToast();
}

function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function filterTemplates(q){
  q=q.toLowerCase();
  document.querySelectorAll(".nav-item").forEach(item=>{
    item.style.display=item.textContent.toLowerCase().includes(q)?"flex":"none";
  });
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  const isDark=document.body.classList.contains("dark");
  localStorage.setItem("theme",isDark?"dark":"light");
  document.getElementById("themeToggle").textContent=isDark?"☀️":"🌙";
}

document.addEventListener("keydown",(e)=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="Enter") copyMsg();
});

buildNav();

if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
  document.getElementById("themeToggle").textContent="☀️";
}

const saved=localStorage.getItem("lastTemplate");
if(saved) selectTemplate(saved);
</script>
</body>
</html>
