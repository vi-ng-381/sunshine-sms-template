<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sunshine Badminton SMS Templates</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;font-size:14px;background:#f5f5f5;color:#222;padding:20px;transition:.2s;}
.app{display:grid;grid-template-columns:240px 1fr;min-height:700px;border:1px solid #ddd;border-radius:14px;overflow:hidden;background:white;}
.sidebar{border-right:1px solid #ddd;background:#fafafa;padding:12px 8px;}
.sidebar-title{font-size:11px;font-weight:700;color:#777;letter-spacing:.05em;text-transform:uppercase;padding:4px 8px 10px;}
.search-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin-bottom:14px;font-size:13px;}
.nav-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:8px;cursor:pointer;color:#555;font-size:13px;transition:.15s;}
.nav-item:hover{background:white;color:#111;}
.nav-item.active{background:white;color:#111;font-weight:600;}
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{padding:16px 20px;border-bottom:1px solid #ddd;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:16px;font-weight:700;}
.badge{font-size:11px;padding:4px 10px;border-radius:999px;font-weight:700;}
.theme-btn{border:none;background:#f3f3f3;width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:16px;}
.theme-btn:hover{background:#e9e9e9;}
.content{padding:20px;display:flex;flex-direction:column;gap:16px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:12px;color:#666;font-weight:600;}
.field input{padding:10px;border:1px solid #ccc;border-radius:8px;width:100%;font-size:13px;}
.preview-label{font-size:12px;color:#666;font-weight:600;margin-bottom:6px;}
.preview-box{background:#fafafa;border:1px solid #ddd;border-radius:8px;padding:14px;font-size:13px;line-height:1.7;white-space:pre-wrap;min-height:160px;}
.char-count{font-size:11px;color:#888;text-align:right;margin-top:5px;}
.action-row{display:flex;gap:10px;}
button{cursor:pointer;}
.btn-copy{padding:10px 18px;border:none;border-radius:8px;background:#111;color:white;font-weight:600;}
.btn-copy:hover{opacity:.9;}
.btn-reset{padding:10px 14px;border:1px solid #ccc;border-radius:8px;background:white;}
.paste-area{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ccc;background:white;color:#222;font-size:13px;resize:none;line-height:1.5;min-height:44px;font-family:monospace;}
.paste-area:focus{outline:2px solid #3b82f6;border-color:#3b82f6;}
.auto-tag{display:inline-block;font-size:10px;padding:1px 6px;border-radius:999px;background:#D1FAE5;color:#065F46;margin-left:4px;vertical-align:middle;font-weight:700;}
.field input.autofilled{background:#f0fdf4;border-color:#86efac;}
.reply-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.reply-card{border-radius:8px;border:1px solid #ddd;padding:12px;}
.reply-card.y-card{background:#f0fdf4;border-color:#86efac;}
.reply-card.n-card{background:#fef2f2;border-color:#fca5a5;}
.reply-label{font-size:11px;font-weight:700;margin-bottom:6px;}
.reply-label.y{color:#065F46;}
.reply-label.n{color:#991B1B;}
.reply-box{font-size:13px;line-height:1.7;white-space:pre-wrap;color:#222;}
.reply-btn{margin-top:8px;padding:7px 14px;border:none;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;}
.reply-btn.y{background:#065F46;color:white;}
.reply-btn.n{background:#991B1B;color:white;}
.reply-btn:hover{opacity:.85;}
.step-label{font-size:11px;color:#888;margin-bottom:4px;}
.avatar-circle{width:38px;height:38px;border-radius:50%;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#1E40AF;flex-shrink:0;}

/* Multi-slot */
.slot-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.slot-row{display:flex;gap:8px;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 10px;}
.slot-row input{padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:white;}
.slot-row input.autofilled{background:#f0fdf4;border-color:#86efac;}
.slot-num{font-size:11px;font-weight:700;color:#6b7280;min-width:18px;}
.slot-del{border:none;background:none;color:#9ca3af;font-size:16px;padding:2px 4px;border-radius:5px;cursor:pointer;}
.slot-del:hover{color:#ef4444;background:#fef2f2;}
.btn-add-slot{padding:8px 14px;border:1px dashed #ccc;border-radius:8px;background:white;font-size:12px;color:#555;display:flex;align-items:center;gap:5px;}
.btn-add-slot:hover{border-color:#111;color:#111;}

/* History database */
.history-section{border-top:1px solid #e5e7eb;padding-top:16px;margin-top:4px;}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.history-title{font-size:12px;font-weight:700;color:#374151;display:flex;align-items:center;gap:6px;}
.history-count{font-size:10px;background:#e5e7eb;color:#6b7280;padding:2px 7px;border-radius:999px;font-weight:700;}
.history-clear{font-size:11px;color:#ef4444;background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:5px;}
.history-clear:hover{background:#fef2f2;}
.history-empty{font-size:12px;color:#9ca3af;text-align:center;padding:16px 0;font-style:italic;}
.history-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;}
.history-tab{padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;border:1px solid #e5e7eb;background:white;cursor:pointer;color:#6b7280;}
.history-tab:hover{background:#f3f4f6;}
.history-tab.active{background:#111;color:white;border-color:#111;}
.db-table-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:8px;}
.db-table{width:100%;border-collapse:collapse;font-size:12px;min-width:520px;}
.db-table th{padding:8px 10px;background:#f5f5f5;font-weight:700;text-align:left;border-bottom:1px solid #e5e7eb;font-size:11px;color:#374151;white-space:nowrap;}
.db-table td{padding:8px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
.db-table tbody tr:last-child td{border-bottom:none;}
.db-table tbody tr:hover{background:#f9fafb;}
.status-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.sp-y{background:#D1FAE5;color:#065F46;}
.sp-n{background:#FEE2E2;color:#991B1B;}
.sp-pending{background:#F3F4F6;color:#6b7280;}
.db-note-input{border:none;background:transparent;font-size:12px;color:#374151;width:100%;min-width:80px;outline:none;padding:2px 4px;border-radius:4px;}
.db-note-input:focus{background:#f0fdf4;outline:1px solid #86efac;}
.db-actions{display:flex;gap:4px;}
.db-btn{border:none;background:none;padding:3px 5px;border-radius:5px;cursor:pointer;font-size:13px;color:#9ca3af;}
.db-btn:hover{background:#f3f4f6;color:#374151;}
.db-btn.del:hover{background:#fef2f2;color:#ef4444;}
.status-select{border:none;background:transparent;font-size:11px;font-weight:700;cursor:pointer;border-radius:4px;padding:2px 4px;}
.no-results{font-size:12px;color:#9ca3af;text-align:center;padding:20px 0;font-style:italic;}
.history-search{padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:12px;width:160px;}
.db-header-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;}

/* Message modal */

.msg-modal{background:white;border-radius:12px;padding:20px;max-width:480px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.msg-modal-name{font-weight:700;font-size:14px;margin-bottom:4px;}
.msg-modal-meta{font-size:11px;color:#6b7280;margin-bottom:12px;}
.msg-modal-body{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;margin-bottom:12px;max-height:260px;overflow-y:auto;}
.msg-modal-actions{display:flex;gap:8px;}

<div style="display:flex;gap:10px;margin-bottom:15px;">

<div class="app">
  <div class="sidebar">
    <div class="sidebar-title">Templates</div>
    <input id="search" class="search-input" placeholder="Search templates..." oninput="filterTemplates(this.value)">
    <div id="nav"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="top-title">Select a template</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="badge" id="top-badge"></span>
        <button id="themeToggle" onclick="toggleTheme()" class="theme-btn">🌙</button>
      </div>
    </div>
    <div class="content" id="content">
      <p style="color:#777;text-align:center;margin-top:2rem;">Select a template from the sidebar</p>
    </div>

<script>
const SIGN = `Sunshine Badminton - https://sunshinebadminton.com.au
Sugar Brush Cafe - https://instagram.com/sugarbrush.cafe`;

/* ── Multi-slot state ── */
let _slots = [{ court: '', time: '' }];
let _currentEntryId = null;

function slotsAdd() {
  _slots.push({ court: '', time: '' });
  renderSlots();
  spGen();
}

function slotsDel(i) {
  if (_slots.length <= 1) return;
  _slots.splice(i, 1);
  renderSlots();
  spGen();
}

function slotsSet(i, field, val) {
  _slots[i][field] = val;
  spGen();
}

function renderSlots() {
  const wrap = document.getElementById('sp-slots');
  if (!wrap) return;
  wrap.innerHTML = _slots.map((s, i) => `
    <div class="slot-row" id="slot-row-${i}">
      <span class="slot-num">#${i + 1}</span>
      <input type="text" placeholder="Court" value="${s.court}" style="width:80px;"
        class="${s.court ? 'autofilled' : ''}"
        oninput="slotsSet(${i},'court',this.value);this.className=this.value?'autofilled':''">
      <input type="text" placeholder="Time e.g. 6PM-9PM" value="${s.time}" style="flex:1;"
        class="${s.time ? 'autofilled' : ''}"
        oninput="slotsSet(${i},'time',this.value);this.className=this.value?'autofilled':''">
      <button class="slot-del" onclick="slotsDel(${i})" title="Remove slot">
        <i class="ti ti-x"></i>
      </button>
    </div>
  `).join('');
}

/* ── Sorting helpers ── */

/**
 * Parse a court value to a number for sorting.
 * Handles numeric courts ("8", "10") and letter courts ("A", "B").
 * Non-parseable values sort last.
 */
function courtSortKey(courtStr) {
  const s = (courtStr || '').trim();
  const n = parseInt(s, 10);
  if (!isNaN(n)) return n;
  // Single letter courts: A=1, B=2 etc.
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 64;
  return 9999;
}

/**
 * Parse a time string like "6PM-9PM", "6.00PM-9.00PM", "18:00-21:00"
 * and return a numeric minute-of-day for the START time, for sorting.
 */
function timeSortKey(timeStr) {
  const s = (timeStr || '').trim();
  // Try to grab the start portion (before dash/en-dash)
  const startPart = s.split(/\s*[–—\-]\s*/)[0].trim();

  // Match formats: 6PM, 6.30PM, 6:30PM, 18:00, 18.00
  const m12 = startPart.match(/^(\d{1,2})(?:[.:](\d{2}))?\s*(am|pm)$/i);
  if (m12) {
    let h = parseInt(m12[1], 10);
    const min = parseInt(m12[2] || '0', 10);
    const ampm = m12[3].toLowerCase();
    if (ampm === 'pm' && h !== 12) h += 12;
    if (ampm === 'am' && h === 12) h = 0;
    return h * 60 + min;
  }
  const m24 = startPart.match(/^(\d{1,2})[.:](\d{2})$/);
  if (m24) {
    return parseInt(m24[1], 10) * 60 + parseInt(m24[2], 10);
  }
  // Plain hour like "18"
  const mHour = startPart.match(/^(\d{1,2})$/);
  if (mHour) return parseInt(mHour[1], 10) * 60;
  return 9999;
}

/**
 * Return a sorted copy of the filled slots:
 *   primary sort  → time ascending (earliest first)
 *   secondary sort → court ascending (lowest number first)
 */
function sortedFilledSlots() {
  return _slots
    .filter(s => s.court || s.time)
    .slice()
    .sort((a, b) => {
      const tDiff = timeSortKey(a.time) - timeSortKey(b.time);
      if (tDiff !== 0) return tDiff;
      return courtSortKey(a.court) - courtSortKey(b.court);
    });
}

/* Build time block for message */
function buildTimeBlock() {
  const filled = sortedFilledSlots();
  if (!filled.length) return { court: '[court]', time: '[time]', multi: false };

  const byTime = {};
  // Preserve insertion order (already sorted by time then court)
  filled.forEach(s => {
    const t = s.time || '[time]';
    if (!byTime[t]) byTime[t] = [];
    byTime[t].push(s.court || '?');
  });

  const times = Object.keys(byTime);
  const allSameTime = times.length === 1;

  if (allSameTime) {
    // Courts within the same time are already sorted (secondary sort above)
    const courts = byTime[times[0]];
    return {
      court: courts.join(', '),
      time: times[0],
      multi: courts.length > 1
    };
  } else {
    const allCourts = filled.map(s => s.court || '?').join(', ');
    const timeLines = times.map(t => `${t} (Court ${byTime[t].join(', ')})`).join('\n');
    return {
      court: allCourts,
      time: timeLines,
      multiTime: true
    };
  }
}

/* ── Session History Database ── */
const HISTORY_KEY = 'sp_reminder_history_v2';
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

let _db = [];

function dbPersist() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(_db)); } catch(e) {}
}

function dbBootstrap() {
  try {
    const saved = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    if (Array.isArray(saved) && saved.length) _db = saved;
  } catch(e) {}
}

function historyLoad() { return _db; }

function historySave(entry) {
  _db.unshift(entry);
  if (_db.length > 500) _db.splice(500);
  dbPersist();
}

function historyUpdate(id, patch) {
  const item = _db.find(i => i.id === id);
  if (item) {
    Object.assign(item, patch);
    dbPersist();
    renderHistory();
  }
}

function historyDelete(id) {
  _db = _db.filter(i => i.id !== id);
  dbPersist();
  renderHistory();
}

function historyClear() {
  const msg = _dbActiveTab === 'all' ? 'Clear ALL reminder history?' : `Clear all records for ${_dbActiveTab}?`;
  if (!confirm(msg)) return;
  if (_dbActiveTab === 'all') {
    _db = [];
  } else {
    _db = _db.filter(i => i.day !== _dbActiveTab);
  }
  dbPersist();
  renderHistory();
}

function historyInitials(name) {
  const p = (name||'').trim().split(/\s+/);
  return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : (name||'??').slice(0,2).toUpperCase();
}

function historyFmtTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  const days = Math.floor(diff/86400000);
  if (days === 1) return 'yesterday';
  if (days < 7) return days + 'd ago';
  return d.toLocaleDateString('en-AU', {day:'numeric',month:'short'});
}

function getTodayDay() {
  return DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
}

let _dbSearch = '';

function showMsgModal(id) {
  const item = _db.find(i => i.id === id);

function copyMsgModal() {

function dbCopyMsg(id) {

  });

/* ── Smart paste helpers ── */
function spInitials(n){
  const p=(n||'').trim().split(/\s+/);
  return p.length>=2?(p[0][0]+p[p.length-1][0]).toUpperCase():(n||'??').slice(0,2).toUpperCase();
}

function spFormatTime(raw){
  raw = raw.trim();
  const m = raw.match(/^(.+?)\s*[–—\-]\s*(.+)$/);
  if(!m) return raw;
  function half(s){
    s=s.trim();
    const ap=s.match(/(am|pm)$/i);
    const suffix=ap?ap[1].toUpperCase():'';
    s=s.replace(/(am|pm)$/i,'').trim();
    const dig=s.match(/^(\d{1,2})(?::(\d{2}))?$/);
    if(!dig) return s+(suffix?suffix:'');
    return dig[1]+'.'+(dig[2]||'00')+suffix;
  }
  return half(m[1])+'-'+half(m[2]);
}

function parseYepBlock(raw){
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
  const slots = [];
  let name='', phone='', fullName='', day='', dateStr='';

  for(const line of lines){
    const dm = line.match(/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\b/i);
    if(dm){
      day = dm[1].charAt(0).toUpperCase() + dm[1].slice(1).toLowerCase();
      const datePart = line.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
      if(datePart) dateStr = datePart[1];
      break;
    }
  }

  lines.forEach(line => {
    const tLine = line.replace(/\t/g, '  ');
    const cm = tLine.match(/^Court\s+(\w+)\s{2,}(.+)$/i) || tLine.match(/^Court\s+(\w+)\s+(\d{1,2}:\d{2}.+)$/i);
    if(cm){
      slots.push({ court: cm[1], time: spFormatTime(cm[2]) });
    }
  });

  const detailsIdx = lines.findIndex(l => /your details/i.test(l));
  const detailsLines = detailsIdx >= 0 ? lines.slice(detailsIdx+1) : lines;

  const phoneMatch = raw.match(/\b(04\d{8}|0[2-9]\d{7,8})\b/);
  if(phoneMatch) phone = phoneMatch[1];

  for(const dl of detailsLines){
    if(/^[\w.+-]+@[\w-]+/.test(dl)) continue;
    if(/^\d[\d\s]{7,}$/.test(dl)) continue;
    if(/^0[24-9]\d/.test(dl.replace(/\s/,''))) continue;
    const commaM = dl.match(/^(.+?),\s*(0[24-9]\d+)/);
    if(commaM){
      fullName = commaM[1].trim();
      if(!phone) phone = commaM[2];
      break;
    }
    if(dl.length > 1 && dl.length < 60 && !/click here/i.test(dl) && !/total price/i.test(dl) && !/badminton/i.test(dl)){
      fullName = dl;
      break;
    }
  }
  name = fullName.split(/\s+/)[0] || '';

  return { slots, name, phone, fullName, day, dateStr };
}

let _pendingMerge = null;
let _parsedDay = '';
let _parsedDateStr = '';

function spParse(){
  const raw = document.getElementById('sp-raw').value.trim();
  if(!raw){
    document.getElementById('sp-parsed').style.display='none';
    _pendingMerge = null;
    _currentEntryId = null;
    hideMergeBanner();
    return;
  }

  const parsed = parseYepBlock(raw);

  const curPhone = (document.getElementById('sp-phone')||{}).value||'';
  const curName = (document.getElementById('sp-dispname')||{}).textContent||'';
  const parsedPhone = parsed.phone || '';
  const parsedName = parsed.fullName || '';

  const sameByPhone = curPhone && parsedPhone && curPhone === parsedPhone;
  const sameByName = curName && curName !== '—' && parsedName &&
    curName.toLowerCase().split(' ')[0] === parsedName.toLowerCase().split(' ')[0];
  // Block has no identity info at all — assume it belongs to whoever is already loaded
  const anonymous = !parsedPhone && !parsedName;

  const alreadyHasData = document.getElementById('sp-parsed') &&
    document.getElementById('sp-parsed').style.display !== 'none';

  if(alreadyHasData && parsed.slots.length && (sameByPhone || sameByName || anonymous)){
    _pendingMerge = parsed;
    showMergeBanner(parsed);
    return;
  }

  _pendingMerge = null;
  hideMergeBanner();
  applyParsed(parsed);
}

function applyParsed(parsed){
  if(parsed.slots.length){
    _slots = parsed.slots.map(s=>({...s}));
  } else if(!_slots.length){
    _slots = [{court:'',time:''}];
  }
  _parsedDay = parsed.day || '';
  _parsedDateStr = parsed.dateStr || '';
  renderSlots();

  function setF(id,val,tagId){
    const el=document.getElementById(id);
    if(!el) return;
    el.value=val;
    el.className=val?'autofilled':'';
    const t=document.getElementById(tagId);
    if(t) t.style.display=val?'inline-block':'none';
  }
  const firstName = parsed.name || parsed.fullName.split(' ')[0] || '';
  setF('sp-name', firstName, 'sp-tn');
  setF('sp-phone', parsed.phone, 'sp-tp');

  const av=document.getElementById('sp-avatar');
  if(av) av.textContent=parsed.fullName?spInitials(parsed.fullName):'?';
  const dn=document.getElementById('sp-dispname');
  if(dn) dn.textContent=parsed.fullName||'—';
  const dp=document.getElementById('sp-dispphone');
  if(dp) dp.textContent=parsed.phone||'—';

  document.getElementById('sp-parsed').style.display='block';
  document.getElementById('sp-raw').value='';
  spGen();
}

function showMergeBanner(parsed){
  let banner = document.getElementById('sp-merge-banner');
  if(!banner) return;
  const slotDesc = parsed.slots.map(s=>`Court ${s.court} ${s.time}`).join(', ');
  const isAnon = !parsed.phone && !parsed.fullName;
  const reason = isAnon ? 'No name/phone in block — adding to current person' : 'Same person detected';
  banner.style.display='flex';
  banner.innerHTML = `
    <div style="flex:1;">
      <strong>${reason}</strong> — add ${parsed.slots.length} more slot${parsed.slots.length>1?'s':''}?
      <div style="font-size:11px;color:#065F46;margin-top:2px;">${slotDesc}</div>
    </div>
    <div style="display:flex;gap:6px;flex-shrink:0;">
      <button class="reply-btn y" style="padding:5px 12px;" onclick="acceptMerge()">Add slots</button>
      <button class="reply-btn" style="padding:5px 12px;background:#6b7280;color:white;" onclick="replacePerson()">New person</button>
      <button class="db-btn" style="color:#9ca3af;" onclick="hideMergeBanner()"><i class="ti ti-x"></i></button>
    </div>
  `;
  document.getElementById('sp-raw').value='';
}

function hideMergeBanner(){
  const b=document.getElementById('sp-merge-banner');
  if(b) b.style.display='none';
}

function acceptMerge(){
  if(!_pendingMerge) return;
  _pendingMerge.slots.forEach(s => _slots.push({...s}));
  _pendingMerge = null;
  hideMergeBanner();
  renderSlots();
  spGen();
}

function replacePerson(){
  if(!_pendingMerge) return;
  const p = _pendingMerge;
  _pendingMerge = null;
  hideMergeBanner();
  applyParsed(p);
}

function spGen(){
  const fn=(document.getElementById('sp-name')||{}).value||'there';
  buildTimeBlock(); // trigger sort
  const msg = buildReminderMsg();
  const el=document.getElementById('sp-preview');
  if(el) el.textContent=msg;
  const yn=document.getElementById('sp-msg-y');
  if(yn) yn.textContent='Thanks for your confirmation, see you soon.';
  const nn=document.getElementById('sp-msg-n');
  if(nn) nn.textContent=`No worries ${fn}, we have removed your booking. Hope to see you next time!\nSunshine Badminton x Sugar Brush`;
}

function spCopyPhone(){
  const p=(document.getElementById('sp-phone')||{}).value||'';
  if(!p) return;
  navigator.clipboard.writeText(p).then(()=>{
    const b=document.getElementById('sp-pbtn');
    if(b){b.innerHTML='✓ Copied';setTimeout(()=>b.innerHTML='<i class="ti ti-copy"></i> Copy phone',1500);}
  });
}

function buildReminderMsg() {
  const fn=(document.getElementById('sp-name')||{}).value||'there';
  const tb = buildTimeBlock();
  let courtLine, timeLine;
  if (tb.multiTime) {
    courtLine = `Court: ${tb.court}`;
    timeLine = `Time:\n${tb.time}`;
  } else {
    courtLine = `Court: ${tb.court}`;
    timeLine = `Time: ${tb.time}`;
  }
  return `Hi ${fn},\nJust a friendly reminder about your badminton session at Sunshine Badminton today.\n${courtLine}\n${timeLine}\nPlease respond 'Y' to confirm or 'N' if you are unable to attend your sessions. Confirmation is required at least 6 hours prior to booking time otherwise your booking will be removed.\nThank you,\nSunshine Badminton x Sugar Brush`;
}

function spCopy(boxId, btnId, saveToHistory){
  const t = buildReminderMsg();
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById(btnId);
    if(b){const orig=b.textContent;b.textContent='✓ Copied!';setTimeout(()=>b.textContent=orig,1500);}
    if(saveToHistory){
      const name=(document.getElementById('sp-name')||{}).value||'';
      const phone=(document.getElementById('sp-phone')||{}).value||'';
      const fullName=(document.getElementById('sp-dispname')||{}).textContent||name;
      const tb = buildTimeBlock();
      const day = _parsedDay || getTodayDay();
      const dateStr = _parsedDateStr || '';
      const entry = {
        id: Date.now().toString(),
        name, fullName, court: tb.court, time: tb.time,
        phone, status:'pending', day, dateStr, ts: Date.now(), note: '',
        msg: t
      };
      _currentEntryId = entry.id;
      historySave(entry);
      renderHistory();
    }
  });
}

function spCopyReply(boxId, btnId, status){
  const t=(document.getElementById(boxId)||{}).textContent||'';
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.getElementById(btnId);
    if(b){const orig=b.textContent;b.textContent='✓ Copied!';setTimeout(()=>b.textContent=orig,1500);}
    if(_currentEntryId) historyUpdate(_currentEntryId, {status});
  });
}

function spClear(){

}

  `;

let current = null;
const fieldVals = {};

function buildNav(){
  const cats=[...new Set(templates.map(t=>t.cat))];
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  cats.forEach(cat=>{
    const section=document.createElement("div");
    section.innerHTML=`<div style="font-size:11px;color:#777;padding:10px 8px 4px;font-weight:700;text-transform:uppercase;">${cat}</div>`;
    templates.filter(t=>t.cat===cat).forEach(t=>{
      const el=document.createElement("div");
      el.className="nav-item";
      el.id="nav-"+t.id;
      el.innerHTML=`<i class="ti ${t.icon}"></i>${t.label}`;
      el.onclick=()=>selectTemplate(t.id);
      section.appendChild(el);
    });
    nav.appendChild(section);
  });
}

function selectTemplate(id){
  current=templates.find(t=>t.id===id);
  localStorage.setItem("lastTemplate",id);
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.remove("active"));
  document.getElementById("nav-"+id).classList.add("active");
  document.getElementById("top-title").textContent=current.label;
  const badge=document.getElementById("top-badge");
  badge.textContent=current.badge.text;
  badge.style.background=current.badge.bg;
  badge.style.color=current.badge.color;
  renderContent();
}

function renderContent(){
  if(!current) return;
  const c=document.getElementById("content");
  if(current.smartPaste){
    c.innerHTML=renderSmartPaste();
    _slots = [{ court: '', time: '' }];
    renderSlots();
    renderHistory();
    return;
  }
  const vals=fieldVals[current.id]||{};
  let html="";
  if(current.fields&&current.fields.length){
    html+=`<div class="field-row">`;
    current.fields.forEach(f=>{
      html+=`<div class="field"><label>${f.label}</label><input type="${f.type}" value="${vals[f.id]||""}" placeholder="${f.placeholder||""}" oninput="onField('${f.id}',this.value)"></div>`;
    });
    html+=`</div>`;
  }
  const msg=current.build(vals);
  if(current.imageOnly){
    html+=`<div><div class="preview-label">Price reference</div><div class="preview-box" id="preview" style="white-space:normal;">${msg}</div></div>`;
  } else {
    html+=`<div><div class="preview-label">Message preview</div><div class="preview-box" id="preview">${msg}</div><div class="char-count">${msg.length} characters</div></div><div class="action-row"><button class="btn-copy" onclick="copyMsg()">Copy message</button><button class="btn-reset" onclick="resetFields()">Reset</button></div>`;
  }
  c.innerHTML=html;
}

function onField(id,val){
  if(!fieldVals[current.id]) fieldVals[current.id]={};
  fieldVals[current.id][id]=val;
  const msg=current.build(fieldVals[current.id]);
  document.getElementById("preview").innerHTML=msg;
  if(!current.imageOnly) document.querySelector(".char-count").textContent=`${msg.length} characters`;
}

function resetFields(){fieldVals[current.id]={};renderContent();}

async function copyMsg(){
  const msg=current.build(fieldVals[current.id]||{});
  await navigator.clipboard.writeText(msg);
  alert("Copied!");
}

function filterTemplates(q){
  q=q.toLowerCase();
  document.querySelectorAll(".nav-item").forEach(item=>{
    item.style.display=item.textContent.toLowerCase().includes(q)?"flex":"none";
  });
}

function toggleTheme(){
  document.body.classList.toggle("dark");
  const isDark=document.body.classList.contains("dark");
  localStorage.setItem("theme",isDark?"dark":"light");
  document.getElementById("themeToggle").textContent=isDark?"☀️":"🌙";
}

document.addEventListener("keydown",(e)=>{
  if((e.ctrlKey||e.metaKey)&&e.key==="Enter"){
    if(current&&!current.imageOnly&&!current.smartPaste) copyMsg();
  }
});

buildNav();
dbBootstrap();
const savedTheme=localStorage.getItem("theme");
if(savedTheme==="dark"){document.body.classList.add("dark");document.getElementById("themeToggle").textContent="☀️";}
const savedTemplate=localStorage.getItem("lastTemplate");
if(savedTemplate) selectTemplate(savedTemplate);
</script>
